<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Profile - HIV / STI</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="bg-light">
<div class="container mt-4">
  <div id="box" class="card p-3">กำลังโหลดข้อมูล...</div>
</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwiLqxaCP_63DiAHzhKFdsAUN0yXUaCNiPZtvOi2_RGo_NEzj4U9wcdvXOMOkmzu7R_wA/exec";   // <- แทนที่
const LIFF_ID = "2008443222-EmAvLMY6";                  // ถ้าเปิดใน LIFF จะใช้ getProfile()

async function loadProfile(uidFromParam) {
  const payload = { action: "get_profile", lineUserId: uidFromParam || "" };
  const res = await fetch(APPS_SCRIPT_URL, {
    method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify(payload)
  });
  const data = await res.json();
  const box = document.getElementById('box');
  if (!data.ok || !data.profile) {
    box.innerHTML = `<div class="alert alert-warning">ไม่พบผลประเมินล่าสุด</div>
      <div><a class="btn btn-primary" href="survey.html">ทำแบบประเมิน</a></div>`;
    return;
  }

  const p = data.profile;
  box.innerHTML = `
    <div class="text-center mb-3">
      <h4>ผลประเมินล่าสุด</h4>
      <p class="text-muted">วันที่: ${p.timestamp}</p>
    </div>

    <div class="mb-2"><b>ระดับความเสี่ยง:</b> ${p.level}</div>
    <div class="mb-2"><b>คะแนน:</b> ${p.score}</div>
    <div class="mb-2"><b>อาการ:</b> ${p.symptoms || "-"}</div>
    <div class="mb-2"><b>Triggers:</b> ${p.triggers || "-"}</div>

    <div class="d-grid gap-2 mt-3">
      <button id="reqKit" class="btn btn-primary">ขอชุดตรวจ</button>
      <button id="bookConsult" class="btn btn-success">นัดเข้ารับคำปรึกษา</button>
      <a href="survey.html" class="btn btn-outline-secondary">ทำแบบประเมินใหม่</a>
    </div>
  `;

  document.getElementById('reqKit').addEventListener('click', async () => {
    try {
      const r = await fetch(APPS_SCRIPT_URL, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ action:"request_kit", lineUserId: uidFromParam })});
      const j = await r.json();
      if (j.ok) alert('ส่งคำขอชุดตรวจเรียบร้อย');
      else alert('ผิดพลาด: ' + JSON.stringify(j));
    } catch(err){ alert(err.message); }
  });

  document.getElementById('bookConsult').addEventListener('click', async () => {
    try {
      const r = await fetch(APPS_SCRIPT_URL, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ action:"book_consult", lineUserId: uidFromParam })});
      const j = await r.json();
      if (j.ok) alert('จองคิวเรียบร้อย เจ้าหน้าที่จะติดต่อกลับ');
      else alert('ผิดพลาด: ' + JSON.stringify(j));
    } catch(err){ alert(err.message); }
  });
}

async function init() {
  // ถ้ามี uid ใน query param ให้ใช้ หากไม่มีก็ลองเรียก LIFF profile (ถ้าอยู่ใน LIFF)
  const params = new URLSearchParams(location.search);
  const uid = params.get('uid');

  if (uid) {
    loadProfile(uid);
    return;
  }

  // ถ้าไม่มี uid ให้ init LIFF และดึง profile
  try {
    await liff.init({ liffId: LIFF_ID });
    const p = await liff.getProfile();
    loadProfile(p.userId);
  } catch(err) {
    console.warn(err);
    document.getElementById('box').innerHTML = '<div class="alert alert-danger">กรุณาเปิดผ่าน LIFF หรือใส่ ?uid=LINEUSERID</div>';
  }
}

init();
</script>
</body>
</html>
